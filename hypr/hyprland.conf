# ============================================================
# hyprland.conf - VERSIÓN COMPATIBLE (sin sintaxis moderna)
# ============================================================

# ========== MONITORES ==========
monitor=,preferred,auto,auto

# ========== ENTORNO ==========
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct

# ========== AUTOINICIO ==========
exec-once = setxkbmap es
exec-once = feh --bg-fill ~/burdisio2.jpg
exec-once = dunst
exec-once = firefox
exec-once = i3-sensible-terminal
exec-once = nm-applet
exec-once = pamac-tray
exec-once = volumeicon
exec-once = xcompmgr -c -f -n
exec-once = polkit-gnome-authentication-agent-1
exec-once = waybar

# ========== VARIABLES ==========
$mod = SUPER
$terminal = i3-sensible-terminal
$menu = rofi -show run

# ========== TECLADO ==========
input {
    kb_layout = es
    kb_variant =
    kb_options =
    kb_model =
    repeat_rate = 50
    repeat_delay = 300
    numlock_by_default = true
}

# ========== GENERAL ==========
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(5294e2ff)
    col.inactive_border = rgba(2c5380ff)
    layout = dwindle
    resize_on_border = true
    # ELIMINADO: cursor_inactive_timeout no va aquí
}

# ========== DECORACIONES ==========
# CORREGIDO: en versiones antiguas decoration no tiene subsecciones
decoration {
    rounding = 0
}

# ========== ANIMACIONES ==========
animations {
    enabled = false
}

# ========== DISPOSICIÓN DE VENTANAS ==========
dwindle {
    preserve_split = true
    force_split = 0
}

# ========== REGLAS DE VENTANAS ==========

# ========== KEYBINDINGS ==========
# Movimiento entre ventanas
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Mover ventanas
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Redimensionar ventanas
bind = $mod CTRL, H, resizeactive, -20 0
bind = $mod CTRL, J, resizeactive, 0 20
bind = $mod CTRL, K, resizeactive, 0 -20
bind = $mod CTRL, L, resizeactive, 20 0

# Restablecer tamaño
bind = $mod, N, layoutmsg, swapwithmaster

# Atajos básicos
bind = $mod, Return, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod SHIFT, D, exec, rofi -show
bind = $mod, Q, killactive,
bind = $mod, Tab, cyclenext, prev
bind = $mod, F, fullscreen,
bind = $mod, T, togglefloating,
bind = $mod SHIFT, E, exit,
bind = $mod CTRL, R, exec, hyprctl reload

# Control de volumen
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Capturas de pantalla
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mod, Print, exec, ~/.config/hypr/scripts/screenshot.sh window
bind = $mod SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh selection

# Aplicaciones
bind = $mod, F1, exec, firefox
bind = $mod, F2, exec, dolphin
bind = $mod, F3, exec, gimp
bind = $mod, F4, exec, kate
bind = $mod, F5, exec, chromium
bind = $mod, F6, exec, calibre
bind = $mod, F7, exec, $terminal -e mocp
bind = $mod, F8, exec, $terminal -e ranger

# ========== WORKSPACES ==========
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6

# Navegación entre workspaces con mouse
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# ========== MISC ==========
misc {
    mouse_move_enables_dpms = false
    key_press_enables_dpms = false
    disable_autoreload = false
}

# ========== DEBUG (opcional) ==========
debug {
    disable_logs = false
}

